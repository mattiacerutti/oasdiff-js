name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync oasdiff binary
        run: bun run sync-binaries

      - name: Run checks
        run: |
          bun run lint
          bun run typecheck
          bun run test
          bun run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check native package adoption
        id: native
        run: echo "publish=$(bun run --silent needs-native-release)" >> "$GITHUB_OUTPUT"

      - name: Prepare native packages
        if: ${{ steps.native.outputs.publish == 'true' }}
        run: |
          bun run prepare-native-packages
          bun install
          bun run check-native-versions --files

      - name: Publish native packages to npm
        if: ${{ steps.native.outputs.publish == 'true' }}
        run: bun run publish-native-packages

      - name: Validate native packages
        run: bun run check-native-versions --registry

      - name: Bump version
        run: |
          bunx npm version ${{ inputs.bump }} --no-git-tag-version --workspaces=false
          version=$(node -p "require('./package.json').version")
          git add package.json bun.lock packages/*/package.json
          git commit -m "chore(release): v$version"
          git tag "v$version"

      - name: Push to main
        run: git push --follow-tags

      - name: Get tag
        id: tag
        run: |
          tag=$(git describe --tags --abbrev=0)
          echo "name=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish @oasdiff-js/oasdiff-js to npm
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
